<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書香咖啡 | 舊日時光</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #2c2318;
    --ink-light: #4a3f32;
    --parchment: #f0ead8;
    --parchment-dark: #e0d5bc;
    --parchment-mid: #e8dfc8;
    --moss: #4a5240;
    --moss-light: #6b7561;
    --rust: #7a4030;
    --rust-light: #9a5848;
    --gold: #8a7040;
    --gold-light: #b09050;
    --cream: #faf6ec;
    --shadow: rgba(44,35,24,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif TC', serif;
    background-color: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── TEXTURE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(44,35,24,0.03) 28px, rgba(44,35,24,0.03) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(44,35,24,0.015) 28px, rgba(44,35,24,0.015) 29px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--ink);
    border-bottom: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--parchment);
    letter-spacing: 0.1em;
  }

  #admin-btn {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.75rem;
    color: #e8dfc8;
    background: transparent;
    border: 1px solid rgba(176,144,80,0.4);
    padding: 5px 14px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
    position: relative;
  }

  #admin-btn:hover {
    background: rgba(176,144,80,0.15);
    border-color: var(--gold-light);
    color: var(--gold-light);
  }

  .badge {
    position: absolute;
    top: -8px; right: -8px;
    background: var(--rust);
    color: var(--cream);
    border-radius: 50%;
    width: 18px; height: 18px;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    font-family: sans-serif;
    font-weight: bold;
  }

  /* ── PAGES ── */
  .page {
    display: none;
    position: fixed;
    top: 56px; left: 0; right: 0; bottom: 0;
    overflow-y: auto;
    overflow-x: hidden;
    z-index: 1;
    background: var(--parchment);
  }

  .page.active { display: block; }

  /* ── HOME ── */
  #page-home {
    display: none;
    flex-direction: column;
  }

  #page-home.active {
    display: flex;
  }

  .hero {
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(to bottom, transparent, var(--parchment));
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    filter: sepia(20%) contrast(0.95) brightness(0.95);
  }

  .home-cta {
    padding: 1.5rem 1rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
  }

  .exhibition-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(0.88rem, 1.8vw, 1.1rem);
    color: var(--ink);
    letter-spacing: 0.18em;
    line-height: 2.2;
    text-align: center;
    padding: 0 1rem;
  }

  .home-btns {
    display: flex;
    gap: 1.2rem;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  @media (max-width: 600px) {
    .hero { flex: 1 1 0; }
    .home-cta {
      padding: 1rem 0.75rem;
      gap: 0.75rem;
    }
    .exhibition-title {
      font-size: 0.78rem;
      line-height: 1.9;
      letter-spacing: 0.12em;
    }
    .btn-primary {
      font-size: 0.9rem;
      padding: 12px 32px;
    }
  }

  .btn-primary {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--cream);
    background: var(--ink);
    border: 2px solid var(--gold);
    padding: 13px 38px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rust);
    transform: translateX(-100%);
    transition: transform 0.3s;
    z-index: 0;
    border-radius: 50px;
  }

  .btn-primary:hover::before { transform: translateX(0); }
  .btn-primary span { position: relative; z-index: 1; }

  .btn-outline {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    letter-spacing: 0.15em;
    color: var(--ink);
    background: transparent;
    border: 2px solid rgba(44,35,24,0.4);
    padding: 13px 32px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-outline:hover {
    background: var(--parchment-dark);
    border-color: var(--ink);
  }

  /* ── MENU ── */
  #page-menu { background: var(--parchment); }

  .page-header {
    text-align: center;
    padding: 1.5rem 1rem 1.2rem;
    border-bottom: 1px solid rgba(44,35,24,0.15);
    position: relative;
  }

  .page-header::before {
    content: '— ✦ —';
    display: block;
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 0.3em;
    margin-bottom: 0.75rem;
  }

  .page-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--ink);
    font-weight: 400;
  }

  .page-header p {
    color: var(--ink-light);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    letter-spacing: 0.05em;
    font-style: italic;
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    max-width: 1000px;
    margin: 0 auto;
    padding: 1.5rem 2rem;
  }

  .menu-card {
    background: var(--cream);
    border: 1px solid rgba(44,35,24,0.2);
    overflow: hidden;
    box-shadow: 0 4px 20px var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .menu-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 32px rgba(44,35,24,0.22);
  }

  .menu-card-img {
    width: 100%;
    height: 280px;
    object-fit: contain;
    display: block;
    background: var(--parchment-mid);
    padding: 12px;
  }

  .menu-card-body {
    padding: 1.25rem 1.5rem 1.5rem;
    border-top: 2px solid var(--parchment-dark);
  }

  .menu-card-no {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--gold);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .menu-card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--ink);
    margin: 0.25rem 0 0.5rem;
  }

  .menu-card-desc {
    font-size: 0.82rem;
    color: var(--ink-light);
    line-height: 1.7;
    letter-spacing: 0.03em;
  }

  .menu-card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px dashed rgba(44,35,24,0.2);
  }

  .btn-add {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: var(--cream);
    background: var(--moss);
    border: none;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-add:hover { background: var(--rust); }

  .btn-add.added {
    background: var(--gold);
    pointer-events: none;
  }

  .menu-bottom {
    text-align: center;
    padding: 0 2rem 4rem;
  }

  .btn-go-order {
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    letter-spacing: 0.18em;
    color: var(--cream);
    background: var(--ink);
    border: 2px solid var(--gold);
    padding: 14px 48px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .btn-go-order:hover { background: var(--rust); border-color: var(--rust-light); }

  /* ── ORDER PAGE ── */
  #page-order { background: var(--parchment); }

  .order-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem;
  }

  .order-section {
    background: var(--cream);
    border: 1px solid rgba(44,35,24,0.18);
    padding: 1.75rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .order-section h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px dashed rgba(44,35,24,0.2);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .order-section h3::before {
    content: '';
    width: 3px; height: 16px;
    background: var(--rust);
    display: inline-block;
  }

  .order-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(44,35,24,0.08);
    font-size: 0.9rem;
  }

  .order-item:last-child { border-bottom: none; }

  .item-qty {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .qty-btn {
    width: 24px; height: 24px;
    background: var(--parchment-dark);
    border: 1px solid rgba(44,35,24,0.2);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }

  .qty-btn:hover { background: var(--rust); color: var(--cream); }

  .name-field-wrap {
    position: relative;
    margin-top: 0.5rem;
  }

  .name-field-label {
    display: block;
    font-size: 0.8rem;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
    font-family: 'IM Fell English', serif;
    font-style: italic;
  }

  .name-input-box {
    border: 2px solid var(--gold);
    background: var(--parchment);
    padding: 14px 16px;
    width: 100%;
    font-family: 'Noto Serif TC', serif;
    font-size: 1.05rem;
    color: var(--ink);
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.2s;
  }

  .name-input-box:focus { border-color: var(--rust); }
  .name-input-box::placeholder { color: rgba(44,35,24,0.35); }

  .name-suffix {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--gold);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    pointer-events: none;
    margin-top: 14px;
  }

  .btn-submit {
    width: 100%;
    padding: 16px;
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    letter-spacing: 0.2em;
    color: var(--cream);
    background: var(--ink);
    border: 2px solid var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn-submit:hover { background: var(--rust); border-color: var(--rust-light); }

  /* ── ADMIN ── */
  #page-admin {
    background: #f7f2e8;
    color: #1a1a1a;
  }

  .admin-header {
    background: #ede6d5;
    border-bottom: 1px solid #ccc0a8;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .admin-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: #1a1a1a;
    letter-spacing: 0.08em;
  }

  .btn-close-admin {
    font-size: 0.8rem;
    color: #333;
    background: transparent;
    border: 1px solid #bbb;
    padding: 6px 16px;
    cursor: pointer;
    letter-spacing: 0.08em;
    font-family: 'Noto Serif TC', serif;
  }

  .btn-close-admin:hover { border-color: #333; color: #000; }

  .admin-tabs {
    display: flex;
    border-bottom: 1px solid #ccc0a8;
    padding: 0 2rem;
  }

  .admin-tab {
    padding: 1rem 1.5rem;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    color: #444;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }

  .admin-tab:hover { color: #000; }

  .admin-tab.active {
    color: #000;
    border-bottom-color: #555;
  }

  .tab-num {
    background: #7a4030;
    color: #fff;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    margin-left: 6px;
    font-family: sans-serif;
  }

  .admin-content {
    padding: 2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .admin-tab-panel { display: none; }
  .admin-tab-panel.active { display: block; }

  .admin-order-card {
    background: #fff;
    border: 1px solid #ddd;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }
  .admin-order-card .card-body {
    flex: 1;
  }

  .admin-order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  .admin-order-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: #1a1a1a;
  }

  .admin-order-time {
    font-size: 0.75rem;
    color: #666;
    letter-spacing: 0.05em;
  }

  .admin-order-items {
    font-size: 0.85rem;
    color: #222;
    line-height: 1.8;
    margin-bottom: 1rem;
  }

  .btn-complete {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    color: #2e7d32;
    background: transparent;
    border: 1px solid #81c784;
    padding: 7px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-complete:hover { background: #2e7d32; color: #fff; }

  .admin-empty {
    text-align: center;
    padding: 3rem;
    color: #aaa;
    font-style: italic;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
  }

  .completed-badge {
    display: inline-block;
    font-size: 0.72rem;
    background: #e8f5e9;
    color: #2e7d32;
    border: 1px solid #a5d6a7;
    padding: 3px 10px;
    letter-spacing: 0.08em;
  }

  /* ── NOTIFICATION ── */
  #notif {
    position: fixed;
    top: 68px; right: 0;
    background: #c0392b;
    color: #fff;
    padding: 20px 28px;
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    z-index: 200;
    box-shadow: -4px 4px 24px rgba(0,0,0,0.5);
    transform: translateX(110%);
    transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
    font-family: 'Noto Serif TC', serif;
    max-width: 340px;
    border-left: 6px solid #fff;
    line-height: 1.7;
  }

  #notif.show {
    transform: translateX(0);
    animation: notif-flash 0.8s ease 0.5s 3;
  }

  @keyframes notif-flash {
    0%, 100% { background: #c0392b; }
    50% { background: #e74c3c; }
  }

  /* ── ORDER SUCCESS OVERLAY ── */
  #order-overlay {
    position: fixed;
    inset: 0;
    background: rgba(240,234,216,0.96);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    cursor: pointer;
  }

  #order-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay-msg {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 2rem);
    color: var(--ink);
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 1.8;
  }

  .overlay-msg::before {
    content: '☕';
    display: block;
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }

  /* ── BACK LINK ── */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--ink-light);
    font-size: 0.82rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    margin: 1.5rem 2rem;
    background: none;
    border: none;
    font-family: 'Noto Serif TC', serif;
  }

  .back-link:hover { color: var(--rust); }

  .new-order-pulse {
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── PASSWORD MODAL ── */
  #pw-modal {
    position: fixed;
    inset: 0;
    background: rgba(44,35,24,0.55);
    z-index: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #pw-modal.show {
    opacity: 1;
    pointer-events: auto;
  }
  .pw-box {
    background: #f7f2e8;
    border: 1px solid #ccc0a8;
    padding: 2.5rem 2rem;
    width: 320px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }
  .pw-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: #1a1a1a;
    margin-bottom: 1.2rem;
    letter-spacing: 0.08em;
  }
  .pw-input {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #ccc0a8;
    background: #fff;
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    color: #1a1a1a;
    outline: none;
    letter-spacing: 0.2em;
    text-align: center;
    margin-bottom: 0.75rem;
    transition: border-color 0.2s;
  }
  .pw-input:focus { border-color: #7a4030; }
  .pw-error {
    font-size: 0.8rem;
    color: #c0392b;
    margin-bottom: 0.75rem;
    min-height: 1.2em;
    letter-spacing: 0.05em;
  }
  .pw-btns {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }
  .pw-confirm {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: #fff;
    background: #2c2318;
    border: none;
    padding: 9px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .pw-confirm:hover { background: #7a4030; }
  .pw-cancel {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    color: #444;
    background: transparent;
    border: 1px solid #bbb;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pw-cancel:hover { background: #ede6d5; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">咖啡師的理性與感性</div>
  <button id="admin-btn" onclick="showAdmin()">後台管理</button>
</nav>


<!-- PASSWORD MODAL -->
<div id="pw-modal">
  <div class="pw-box">
    <h3>後台管理 · 請輸入密碼</h3>
    <input type="password" id="pw-input" class="pw-input" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')confirmPw()">
    <div class="pw-error" id="pw-error"></div>
    <div class="pw-btns">
      <button class="pw-confirm" onclick="confirmPw()">確認</button>
      <button class="pw-cancel" onclick="closePwModal()">取消</button>
    </div>
  </div>
</div>
<!-- NOTIFICATION -->
<div id="notif"></div>

<!-- ORDER SUCCESS OVERLAY -->
<div id="order-overlay" onclick="dismissOverlay()">
  <div class="overlay-msg">稍等片刻，<br>馬上為您製作咖啡<br><span style="font-size:0.75rem;opacity:0.5;letter-spacing:0.1em;font-family:'Noto Serif TC',serif;">點一下畫面繼續</span></div>
</div>

<!-- ===== PAGE: HOME ===== -->
<div id="page-home" class="page active">
  <div class="hero">
    <img src="https://i.ibb.co/WWYVBMLG/image.png" alt="封面照">
  </div>
  <div class="home-cta">
    <p class="exhibition-title">國立華南高商 114 學年度第二學期<br>咖啡師的理性與感性成果展</p>
    <div class="home-btns">
      <button class="btn-primary" onclick="showMenu()"><span>今天我想來點…</span></button>
    </div>
  </div>
</div>

<!-- ===== PAGE: MENU ===== -->
<div id="page-menu" class="page">
  <button class="back-link" onclick="showPage('page-home')">← 返回首頁</button>
  <div class="page-header">
    <h2>在忙碌日常裡，留一杯咖啡的時間</h2>
  </div>

  <div class="menu-grid">
    <div class="menu-card">
      <img class="menu-card-img" src="https://i.ibb.co/759C3nd/image.jpg" alt="手沖咖啡">
      <div class="menu-card-body">
        <div class="menu-card-no">No. 01 · Hand Drip</div>
        <div class="menu-card-name">手沖咖啡</div>
        <div class="menu-card-desc">一杯手沖，沖出今天剛好的節奏。</div>
        <div class="menu-card-footer">
          <button class="btn-add" data-id="1" data-name="手沖咖啡" onclick="addToCart(this)">＋ 加入</button>
        </div>
      </div>
    </div>

    <div class="menu-card">
      <img class="menu-card-img" src="https://i.ibb.co/JRfwRfM3/image.jpg" alt="冰拿鐵">
      <div class="menu-card-body">
        <div class="menu-card-no">No. 02 · Iced Latte</div>
        <div class="menu-card-name">冰拿鐵咖啡</div>
        <div class="menu-card-desc">在微苦與奶香之間，找到今日的平衡。</div>
        <div class="menu-card-footer">
          <button class="btn-add" data-id="2" data-name="冰拿鐵咖啡" onclick="addToCart(this)">＋ 加入</button>
        </div>
      </div>
    </div>

    <div class="menu-card">
      <img class="menu-card-img" src="https://i.ibb.co/7xMVTGTR/image.jpg" alt="西西里咖啡">
      <div class="menu-card-body">
        <div class="menu-card-no">No. 03 · Caffè Siciliano</div>
        <div class="menu-card-name">西西里咖啡</div>
        <div class="menu-card-desc">清新的檸檬香，遇見咖啡最溫柔的樣子。</div>
        <div class="menu-card-footer">
          <button class="btn-add" data-id="3" data-name="西西里咖啡" onclick="addToCart(this)">＋ 加入</button>
        </div>
      </div>
    </div>
  </div>

  <div class="menu-bottom">
    <button class="btn-go-order" onclick="goToOrder()">前往確認訂單</button>
  </div>
</div>

<!-- ===== PAGE: ORDER ===== -->
<div id="page-order" class="page">
  <button class="back-link" onclick="showMenu()">← 返回菜單</button>

  <div class="order-wrap">
    <div class="page-header" style="margin-bottom:1.5rem">
      <h2>訂單確認</h2>
      <p>請確認您的選擇並留下姓名</p>
    </div>

    <div class="order-section">
      <h3>已選品項</h3>
      <div id="order-items-list"></div>
    </div>

    <div class="order-section">
      <h3>客人姓名</h3>
      <label class="name-field-label">請輸入您的姓名</label>
      <div class="name-field-wrap">
        <input type="text" id="customer-name" class="name-input-box" placeholder="王大明">
        <span class="name-suffix">老師的訂單</span>
      </div>
    </div>

    <button class="btn-submit" onclick="submitOrder()">將訂單送往後台</button>
  </div>
</div>

<!-- ===== PAGE: SUCCESS (empty) ===== -->
<div id="page-success" class="page"></div>

<!-- ===== PAGE: ADMIN ===== -->
<div id="page-admin" class="page">
  <div class="admin-header">
    <div class="admin-title">✦ 後台管理系統</div>
    <button class="btn-close-admin" onclick="showPage('page-home')">× 關閉後台</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('all', this)">
      總訂單 <span class="tab-num" id="tab-all-num">0</span>
    </button>
    <button class="admin-tab" onclick="switchTab('pending', this)">
      待完成訂單 <span class="tab-num" id="tab-pending-num">0</span>
    </button>
    <button class="admin-tab" onclick="switchTab('done', this)">
      已完成訂單 <span class="tab-num" id="tab-done-num">0</span>
    </button>
  </div>

  <div class="admin-content">
    <div id="panel-all" class="admin-tab-panel active">
      <div class="admin-panel-toolbar">
        <button class="btn-delete-selected" id="del-btn-all" onclick="deleteSelected('all')">🗑 刪除已勾選</button>
      </div>
      <div id="panel-all-list"></div>
    </div>
    <div id="panel-pending" class="admin-tab-panel">
      <div class="admin-panel-toolbar">
        <button class="btn-delete-selected" id="del-btn-pending" onclick="deleteSelected('pending')">🗑 刪除已勾選</button>
      </div>
      <div id="panel-pending-list"></div>
    </div>
    <div id="panel-done" class="admin-tab-panel">
      <div class="admin-panel-toolbar">
        <button class="btn-delete-selected" id="del-btn-done" onclick="deleteSelected('done')">🗑 刪除已勾選</button>
      </div>
      <div id="panel-done-list"></div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz-jLD4wrdL5Pc8yTBX-qifzf_uPp_J9-i37eX1Jdmo2WjH9ArgefrbzdNKRaFOjLDN7w/exec';
let cart = [];

// ── GOOGLE SHEET API ──────────────────────────────────────
function gasPost(data) {
  const form = new FormData();
  form.append('payload', JSON.stringify(data));
  return fetch(GAS_URL, {
    method: 'POST',
    body: form
  }).then(r => r.json()).catch(() => ({ ok: false }));
}

function gasGet() {
  return fetch(GAS_URL + '?t=' + Date.now())
    .then(r => r.json())
    .catch(() => ({ orders: [] }));
}

// ── LOCAL STORAGE (備援 + badge 用) ──────────────────────
function getOrders() {
  try { return JSON.parse(localStorage.getItem('cafe_orders') || '[]'); }
  catch { return []; }
}
function saveOrders(orders) {
  localStorage.setItem('cafe_orders', JSON.stringify(orders));
}

// ── PAGE NAV ─────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.scrollTop = 0;
  });
  const el = document.getElementById(id);
  el.classList.add('active');
  el.scrollTop = 0;
}

function showMenu() { showPage('page-menu'); }

function goToOrder() {
  if (cart.length === 0) { alert('請先選擇至少一項咖啡品項！'); return; }
  renderOrderPage();
  showPage('page-order');
}

function showAdmin() {
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

function confirmPw() {
  const val = document.getElementById('pw-input').value;
  if (val === '12345') {
    document.getElementById('pw-modal').classList.remove('show');
    renderAdmin();
    showPage('page-admin');
  } else {
    document.getElementById('pw-error').textContent = '密碼錯誤，請再試一次';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function closePwModal() {
  document.getElementById('pw-modal').classList.remove('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
}

// ── CART ─────────────────────────────────────────────────
function addToCart(btn) {
  const id = parseInt(btn.dataset.id);
  const existing = cart.find(i => i.id === id);
  if (existing) { existing.qty++; }
  else { cart.push({ id, name: btn.dataset.name, qty: 1 }); }
  btn.textContent = '✓ 已加入';
  btn.classList.add('added');
}

function renderOrderPage() {
  const list = document.getElementById('order-items-list');
  list.innerHTML = '';
  if (cart.length === 0) {
    list.innerHTML = '<p style="font-size:0.85rem;color:var(--ink-light);font-style:italic;text-align:center;padding:1rem">尚未選擇任何品項</p>';
    return;
  }
  cart.forEach(item => {
    const row = document.createElement('div');
    row.className = 'order-item';
    row.innerHTML = `
      <span>${item.name}</span>
      <div class="item-qty">
        <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
        <span>${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${item.id}, 1)">＋</button>
      </div>`;
    list.appendChild(row);
  });
}

function changeQty(id, delta) {
  const item = cart.find(i => i.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
  renderOrderPage();
  document.querySelectorAll('.btn-add').forEach(btn => {
    const inCart = cart.find(i => i.id === parseInt(btn.dataset.id));
    if (!inCart) { btn.textContent = '＋ 加入'; btn.classList.remove('added'); }
  });
}

// ── SUBMIT ORDER ─────────────────────────────────────────
function submitOrder() {
  if (cart.length === 0) { alert('請先選擇咖啡品項！'); return; }
  const name = document.getElementById('customer-name').value.trim();
  if (!name) {
    document.getElementById('customer-name').focus();
    document.getElementById('customer-name').style.borderColor = 'var(--rust)';
    return;
  }
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  const newOrder = {
    id: Date.now(), name,
    items: [...cart],
    time: d.getFullYear()+'年'+pad(d.getMonth()+1)+'月'+pad(d.getDate())+'日 '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds()),
    status: 'pending'
  };

  // 存 localStorage
  const orders = getOrders();
  orders.push(newOrder);
  saveOrders(orders);

  // 存 Google Sheet
  gasPost({ action: 'addOrder', order: newOrder });

  showNotif('🔔 新訂單！' + name + ' 老師的訂單已送出');
  cart = [];
  document.querySelectorAll('.btn-add').forEach(btn => { btn.textContent = '＋ 加入'; btn.classList.remove('added'); });
  document.getElementById('customer-name').value = '';
  document.getElementById('customer-name').style.borderColor = '';
  updateAdminBadge();
  showPage('page-home');
  document.getElementById('order-overlay').classList.add('show');
}

function dismissOverlay() {
  document.getElementById('order-overlay').classList.remove('show');
  showPage('page-home');
}

// ── ADMIN RENDER ─────────────────────────────────────────
function renderAdmin() {
  // 顯示載入中
  ['all','pending','done'].forEach(t => {
    const l = document.getElementById('panel-' + t + '-list');
    if (l) l.innerHTML = '<div class="admin-empty">載入中…</div>';
  });

  // 從 Google Sheet 讀取
  gasGet().then(data => {
    let orders = [];
    if (data.orders && data.orders.length) {
      // 把 Sheet 資料轉成本地格式
      orders = data.orders.map(o => ({
        id: o.id,
        name: o.name,
        items: typeof o.items === 'string'
          ? o.items.split('、').map(s => { const m = s.match(/^(.+) × (\d+)$/); return m ? { name: m[1], qty: parseInt(m[2]) } : { name: s, qty: 1 }; })
          : o.items,
        time: o.time,
        status: o.status
      }));
      // 同步更新 localStorage
      saveOrders(orders);
    } else {
      // Sheet 無資料時用 localStorage
      orders = getOrders();
    }

    const pending = orders.filter(o => o.status === 'pending');
    const done = orders.filter(o => o.status === 'done');
    document.getElementById('tab-all-num').textContent = orders.length;
    document.getElementById('tab-pending-num').textContent = pending.length;
    document.getElementById('tab-done-num').textContent = done.length;
    renderPanel('panel-all', orders, true);
    renderPanel('panel-pending', pending, true);
    renderPanel('panel-done', done, false);
    updateAdminBadge();
    ['all','pending','done'].forEach(t => {
      const b = document.getElementById('del-btn-' + t);
      if (b) b.classList.remove('visible');
    });
  });
}

function renderPanel(panelId, orders, showComplete) {
  const listId = panelId + '-list';
  const list = document.getElementById(listId);
  const delBtn = document.getElementById('del-btn-' + panelId.replace('panel-',''));
  if (!list) return;
  if (orders.length === 0) {
    list.innerHTML = '<div class="admin-empty">— 目前沒有訂單 —</div>';
    if (delBtn) delBtn.classList.remove('visible');
    return;
  }
  list.innerHTML = [...orders].reverse().map(o => `
    <div class="admin-order-card" id="order-card-${o.id}">
      <input type="checkbox" class="order-checkbox" data-id="${o.id}" onchange="updateDelBtn('${panelId}')">
      <div class="card-body">
        <div class="admin-order-top">
          <div class="admin-order-name">${o.name} 老師的訂單</div>
          <div class="admin-order-time">${o.time}</div>
        </div>
        <div class="admin-order-items">${Array.isArray(o.items) ? o.items.map(i => i.name + ' × ' + i.qty).join('　·　') : o.items}</div>
        ${o.status === 'done'
          ? '<span class="completed-badge">✓ 已完成</span>'
          : showComplete ? `<button class="btn-complete" onclick="markDone(${o.id})">✓ 標示完成</button>` : ''}
      </div>
    </div>`).join('');
  if (delBtn) delBtn.classList.remove('visible');
}

function updateDelBtn(panelId) {
  const listId = panelId + '-list';
  const delBtnId = 'del-btn-' + panelId.replace('panel-','');
  const checked = document.querySelectorAll('#' + listId + ' .order-checkbox:checked').length;
  const delBtn = document.getElementById(delBtnId);
  if (delBtn) {
    if (checked > 0) delBtn.classList.add('visible');
    else delBtn.classList.remove('visible');
  }
}

function deleteSelected(tabName) {
  const panelId = 'panel-' + tabName;
  const listId = panelId + '-list';
  const checked = document.querySelectorAll('#' + listId + ' .order-checkbox:checked');
  if (checked.length === 0) return;
  if (!confirm('確定要刪除已勾選的 ' + checked.length + ' 筆訂單？')) return;
  const idsToDelete = Array.from(checked).map(cb => cb.dataset.id);

  // 刪 localStorage
  let orders = getOrders();
  orders = orders.filter(o => !idsToDelete.includes(String(o.id)));
  saveOrders(orders);

  // 刪 Google Sheet
  gasPost({ action: 'deleteOrders', ids: idsToDelete });

  updateAdminBadge();
  renderAdmin();
}

function markDone(id) {
  // 更新 localStorage
  const orders = getOrders();
  const order = orders.find(o => String(o.id) === String(id));
  if (order) { order.status = 'done'; saveOrders(orders); }

  // 更新 Google Sheet
  gasPost({ action: 'updateStatus', id: String(id), status: 'done' });

  renderAdmin();
}

function switchTab(name, btn) {
  document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.admin-tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function updateAdminBadge() {
  const orders = getOrders();
  const pendingCount = orders.filter(o => o.status === 'pending').length;
  const adminBtn = document.getElementById('admin-btn');
  let badge = adminBtn.querySelector('.badge');
  if (pendingCount > 0) {
    if (!badge) { badge = document.createElement('span'); badge.className = 'badge new-order-pulse'; adminBtn.appendChild(badge); }
    badge.textContent = pendingCount;
  } else { if (badge) badge.remove(); }
}

let notifTimer;
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => n.classList.remove('show'), 4000);
  updateAdminBadge();
}

updateAdminBadge();
</script>
</body>
</html>
